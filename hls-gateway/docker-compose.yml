services:
  hls-gateway:
    build: .
    image: hls-gateway:local
    container_name: hls-gateway
    user: "1000:1000"
    restart: unless-stopped
    network_mode: host
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - /mnt/tv/hls:/data/hls
      - ./service.py:/app/service.py:ro
      - ./state-backup:/state-backup
      - /mnt/tv:/recordings:ro
    environment:
      - TVH_BASE=http://raspberrypi5lan:9981
      - HOST_URL=https://raspberrypi5lan:8443
      - IDLE_TIMEOUT=30
      - FAV_TAG_UUID=ed43d130b6d7f8e56b063db6de8d2b06
      - ALWAYS_WARM=
      - TZ=Europe/Berlin
      # Live-buffer comskip can be offloaded to an external host by
      # setting LIVE_ADS_OFFLOAD (e.g. =mac). The external scanner
      # writes /mnt/tv/hls/.live_ads.json directly; our internal
      # _live_adskip_loop goes dormant and /api/live-ads/<slug>
      # re-reads the JSON each call. Currently disabled until the SSD
      # is on USB 3 — parallel SMB reads + DVB writes over USB 2 tip
      # the drive into EXT4 shutdown (happened 2026-04-21, see CLAUDE.md
      # Operations section).
      # - LIVE_ADS_OFFLOAD=mac
