services:
  tvheadend:
    image: lscr.io/linuxserver/tvheadend:latest
    container_name: tvheadend
    restart: unless-stopped
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      # - RUN_OPTS= #optional
    volumes:
      - ./config:/config
      - /mnt/tv:/recordings
    # Logging limits werden über /etc/docker/daemon.json global gesetzt (10MB x 3)
